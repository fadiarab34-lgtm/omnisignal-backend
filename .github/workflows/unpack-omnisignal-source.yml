name: Unpack OmniSignal source

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/unpack-omnisignal-source.yml"
      - ".omnisignal-upload/**"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rehydrate source archive
        run: |
          set -euo pipefail
          base64 -d .omnisignal-upload/source.tar.gz.b64 > /tmp/omnisignal-source.tar.gz
          tar -xzf /tmp/omnisignal-source.tar.gz
          rm -rf .omnisignal-upload .github/workflows/unpack-omnisignal-source.yml
      - name: Commit expanded source
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Expand OmniSignal production platform source"
            git push
          fi
